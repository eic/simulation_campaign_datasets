.eRu_10x115_variables: &eRu_10x115_variables
  EBEAM_OVERRIDE: "10"
  PBEAM_OVERRIDE: "115_Ru96"

DIS:eRu:10x115:nevents:
  variables:
    <<: *eRu_10x115_variables
  extends: .nevents
  parallel:
    matrix:
      - DATA:
        - "DIS/eRu/10x115/BeAGLE1.03.02-1.0_DIS_eRu_en_10x115.csv"
        - "DIS/eRu/10x115/BeAGLE1.03.02-1.0_DIS_eRu_ep_10x115.csv"

DIS:eRu:10x115:timings:
  variables:
    <<: *eRu_10x115_variables
  extends: .timings
  needs:
    - DIS:eRu:10x115:nevents
  parallel:
    matrix:
      - DATA:
        - "DIS/eRu/10x115/BeAGLE1.03.02-1.0_DIS_eRu_en_10x115.csv"
        - "DIS/eRu/10x115/BeAGLE1.03.02-1.0_DIS_eRu_ep_10x115.csv"

DIS:eRu:10x115:collect:
  variables:
    <<: *eRu_10x115_variables
  extends: .collect
  needs:
    - DIS:eRu:10x115:timings
