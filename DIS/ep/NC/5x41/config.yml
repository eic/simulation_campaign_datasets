        - "DIS/ep/NC/5x41/pythia8.316-1.0_NC_noRad_ep_5x41_q2_10to100.csv"
        - "DIS/ep/NC/5x41/pythia8.316-1.0_NC_noRad_ep_5x41_q2_100to1000.csv"

DIS:ep:NC:5x41:collect:
  extends: .collect
  needs: 
    - DIS:ep:NC:5x41:timings
