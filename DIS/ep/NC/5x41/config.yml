    matrix:
      - DATA:
        - "DIS/ep/NC/5x41/DIS_NC_5x41_minQ2=100.csv"
        - "DIS/ep/NC/5x41/DIS_NC_5x41_minQ2=10.csv"
        - "DIS/ep/NC/5x41/DIS_NC_5x41_minQ2=1.csv"
        - "DIS/ep/NC/5x41/pythia8.316-1.0_NC_noRad_ep_5x41_q2_1to10.csv"
